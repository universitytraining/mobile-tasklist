workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - name: Fix gradlew permissions
        script: |
          chmod +x $CM_BUILD_DIR/gradlew
      - name: Set up KMP
        script: |
          cd $CM_BUILD_DIR
          ./gradlew :composeApp:assembleDebug
      - name: Build iOS
        script: |
          cd $CM_BUILD_DIR/iosApp
          xcodebuild \
            -project iosApp.xcodeproj \
            -scheme iosApp \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            OTHER_LDFLAGS="-lsqlite3" 2>&1 | tail -100
    artifacts:
      - composeApp/build/outputs/**/*.apk
      - iosApp/DerivedData/**/*.app